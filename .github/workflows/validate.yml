name: TARS Plugin Validation

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/**'
      - 'templates/**'
      - '_system/**'
      - '_views/**'
      - '.claude-plugin/**'
      - 'tests/**'
      - 'CLAUDE.md'
      - 'CHANGELOG.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Plugin Structure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run schema validation
        run: python3 scripts/validate-schema.py .

      - name: Run secret scan
        run: python3 scripts/scan-secrets.py .

      - name: Validate required structure
        run: |
          ERRORS=0

          # Check required directories
          for dir in _system _views memory journal contexts inbox templates scripts skills tests; do
            if [ ! -d "$dir" ]; then
              echo "::error::Missing required directory: $dir"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # Check required system files
          for f in _system/config.md _system/schemas.yaml _system/guardrails.yaml _system/alias-registry.md; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing system file: $f"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # Check required skills
          for skill in core welcome learn tasks meeting briefing answer maintain; do
            if [ ! -f "skills/$skill/SKILL.md" ]; then
              echo "::error::Missing skill: skills/$skill/SKILL.md"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # Check CLAUDE.md
          if [ ! -f "CLAUDE.md" ]; then
            echo "::error::Missing CLAUDE.md"
            ERRORS=$((ERRORS + 1))
          fi

          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS structural issues found"
            exit 1
          fi
          echo "All structural checks passed"

      - name: Check version bump
        run: |
          BASE_VERSION=$(git show ${{ github.event.pull_request.base.sha }}:.claude-plugin/plugin.json 2>/dev/null | python3 -c "import json,sys; print(json.load(sys.stdin).get('version',''))" 2>/dev/null || echo "")
          HEAD_VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json')).get('version',''))")

          if [ -n "$BASE_VERSION" ] && [ "$BASE_VERSION" = "$HEAD_VERSION" ]; then
            echo "::warning::plugin.json version ($HEAD_VERSION) was not bumped"
          else
            echo "Version: $BASE_VERSION -> $HEAD_VERSION"
          fi

      - name: Check CHANGELOG updated
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} 2>/dev/null || echo "")
          if echo "$CHANGED" | grep -q "CHANGELOG.md"; then
            echo "CHANGELOG.md was updated"
          else
            echo "::warning::CHANGELOG.md was not updated"
          fi
