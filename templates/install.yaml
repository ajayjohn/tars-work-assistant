# TARS install state - workspace-specific configuration written by /welcome.
#
# This file lives at _system/install.yaml inside the user's workspace. It records
# which folder TARS believes is active (workspace_path) plus per-install
# preferences. Hooks consult it on every session start to detect a moved or
# duplicated workspace before any write happens.
#
# Edit only via /welcome or /lint --actions; manual edits may be overwritten.
# If you need to relocate the workspace, run /welcome --relocate.

# Storage mode. Headless is a plain Markdown folder driven through Claude.
# Obsidian uses the same folder plus optional Obsidian views and helper skills.
workspace_type: "headless"

# Absolute path to the active Markdown workspace. Hooks compare this against the
# current working directory; a mismatch triggers a loud warning and refuses
# silent writes.
workspace_path: ""

# Backward-compatible alias for older hooks and vaults. Keep equal to
# workspace_path until all deployed installs have migrated.
vault_path: ""

# Obsidian is optional. When enabled, obsidian_vault_path is usually the same as
# workspace_path, but may differ if the user stores TARS in a subfolder.
obsidian_enabled: false
obsidian_vault_path: ""

# Stable identifier for this install. Used by telemetry to disambiguate vaults
# across machines without leaking the path.
installation_id: ""

# Persona seeded during onboarding. One of: product-leader,
# sales-customer-facing, delivery-pm, data-science-lead, architect-staff-eng,
# support-ops-lead, engineering-manager. Empty until /welcome runs.
persona: ""

# Plugin version that wrote this file; helps lint detect stale installs that
# need migration.
plugin_version: ""

# ISO-8601 timestamps. Updated by SessionStart on each successful resolution.
created: ""
last_session_at: ""

# Scheduler type recorded at last job registration.
# "mcp__scheduled-tasks" | "CronCreate" | "" (unregistered / not yet detected).
# Used by SessionStart and /maintain to enforce mutual exclusion: a job registered
# with one scheduler is never silently re-registered with the other.
scheduler_type: ""

# Notice IDs recently shown or handled. SessionStart uses this to avoid
# repeating the same housekeeping line every session.
acknowledged_notices:
